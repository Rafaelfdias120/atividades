<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abastecimento</title>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
  </head>
  <body style="color: white;" bgcolor="bg-">
    <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark"></nav>
      <h1>Calculadora de Abastecimento</h1>
      </nav>
    <hr>
    <p>Escolha o tipo de combustível e a quantidade de litros.</p>
    <p>tabela de preços:</p>
    <ul>
      <li>Gasolina: R$ 6,40</li>
      <li>Etanol: R$ 5,20</li>
      <li>Diesel: R$ 5,80</li>
    </ul>
    <form id="formularioAbastecimento">
      <label for="combustivel">Tipo combustível</label>
      <select name="combustivel" id="combustivel">
        <option value="">Escolha uma opção</option>
        <option value="gasolina">Gasolina</option>
        <option value="etanol">Etanol</option>
        <option value="diesel">Diesel</option>
      </select>
      <label for="litros">Quantidade (litros):</label>
      <input type="number" id="litros" min="0" step="0.1" />
    </form>
    <h2>Resultado</h2>
    <p id="resultado"></p>
    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
